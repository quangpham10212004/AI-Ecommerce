server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API — dùng variable để nginx không fail khi upstream chưa sẵn sàng
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://api_gateway:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
